---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: csi-driver-nfs
  namespace: kube-system
spec:
  interval: 10m
  url: https://raw.githubusercontent.com/kubernetes-csi/csi-driver-nfs/master/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nfs-csi
  namespace: kube-system
spec:
  interval: 10m

  chart:
    spec:
      chart: csi-driver-nfs
      version: 4.13.2
      sourceRef:
        kind: HelmRepository
        name: csi-driver-nfs
        namespace: kube-system
  install:
    createNamespace: true
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  values:
    node:
      nodeSelector:
        kubernetes.io/hostname: kube-runner
    storageClasses:
      - name: nas
        parameters:
          server: nas.infra.rmtt.host
          share: /mnt/main/kubernetes
        reclaimPolicy: Delete
        volumeBindingMode: Immediate
        mountOptions:
          - nfsvers=4.2
          - async
          - noatime
