apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pocket-id
  namespace: pocket-id
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`auth.rmtt.tech`)
      kind: Rule
      services:
        - name: pocket-id
          port: 1411
  tls:
    certResolver: cfresolver
