---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: filestash
  namespace: filestash
spec:
  interval: 10m
  chart:
    spec:
      chart: ./charts/filestash
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    createNamespace: true
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  values:
    nodeSelector:
      beta.kubernetes.io/arch: amd64
    persistence:
      enabled: true
      storageClass: local-storage
      size: 10Gi
      annotations:
        helm.sh/resource-policy: keep
  upgrade:
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
