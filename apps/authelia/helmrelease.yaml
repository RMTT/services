---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authelia
  namespace: authelia
spec:
  dependsOn:
    - name: cloudnative-pg
      namespace: operators
  interval: 1m

  valuesFrom:
    - kind: Secret
      name: helm-values
  chart:
    spec:
      chart: ./charts/authelia
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    createNamespace: true
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  values:
    config:
      domain: rmtt.tech
      autheliaUrl: https://auth.rmtt.tech
    nodeSelector:
      kubernetes.io/hostname: homeserver 
    service:
      nodePort: 30002
    persistence:
      enabled: true
      size: 1Gi
      storageClassName: local-path
  upgrade:
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
