# Cloudflare Tunnels -> per tunnel: public CNAME + tunnel ingress + LAN adguard
# tunnel id comes from secret key cf_tunnel_id_<name>
tunnels:
  oracle:
    default_zone: rmtt.tech
    default_service: https://k3s-master.infra.rmtt.host
    routes:
      auth: {}
      miniflux: {}
      karakeep: {}
      alist: {}
      status: {}
      affine: {}

# LAN-only -> adguard rewrite only; no public DNS
# Public host A records -> Cloudflare A + adguard
hosts:
  private:
    rmtt.tech:
      status: 198.19.20.1
      oracle.proxy: 198.19.20.1
  public:
    rmtt.host:
      k3s-master.infra: 198.19.20.1
      homerouter.infra: 198.19.19.1
      homerouter.home: 192.168.6.1
      cn2-box.infra: 198.19.20.2
      cn2-box: 104.194.71.122
      oracle: 147.224.201.181
      oracle.infra: 198.19.20.1
      kube-runner: 147.224.143.231
      kube-runner.infra: 198.19.20.3
