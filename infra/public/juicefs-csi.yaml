---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: bitnami
  namespace: kube-system
spec:
  type: oci
  interval: 10m
  url: oci://registry-1.docker.io/bitnamicharts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: juicefs-redis-oracle
  namespace: kube-system
spec:
  interval: 10m
  chart:
    spec:
      chart: redis
      version: 27.0.10
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: kube-system
  install:
    createNamespace: true
  values:
    architecture: standalone
    auth:
      enabled: false
    master:
      persistence:
        enabled: true
        storageClass: local-path
        size: 10Gi
        annotations:
          helm.sh/resource-policy: keep 
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"

