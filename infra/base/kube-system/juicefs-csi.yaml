---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: juicefs-csi
  namespace: kube-system
spec:
  interval: 10m
  url: https://juicedata.github.io/charts/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: juicefs-csi
  namespace: kube-system
spec:
  interval: 10m
  chart:
    spec:
      chart: juicefs-csi-driver
      version: 0.32.0
      sourceRef:
        kind: HelmRepository
        name: juicefs-csi
        namespace: kube-system
  install:
    createNamespace: true
  values:
    dashboard:
      service:
        type: ClusterIP
    controller:
      replicas: 1
      metricsPort: "9567"
    node:
      metricsPort: "9567"
