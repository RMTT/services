---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: traefik
  namespace: kube-system
spec:
  interval: 10m
  url: https://traefik.github.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: kube-system
spec:
  interval: 10m
  chart:
    spec:
      chart: traefik
      version: 41.0.2
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: kube-system
  install:
    createNamespace: true
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  values:
    nodeSelector:
      node-role.kubernetes.io/control-plane: "true"
    ports:
      web:
        nodePort: 80
        forwardedHeaders:
          insecure: false 
          trustedIPs:
            - "10.42.0.0/16"
            - "100.64.0.0/10"
      websecure:
        nodePort: 443
        forwardedHeaders:
          insecure: false 
          trustedIPs:
            - "10.42.0.0/16"
            - "100.64.0.0/10"
    service:
      spec:
        type: NodePort
        externalTrafficPolicy: Local
    envFrom:
      - secretRef:
          name: traefik-env
    certificatesResolvers:
      cfresolver:
        acme:
          email: "iamrmttt@gmail.com"
          storage: "/data/acme.json"
          dnsChallenge:
            provider: "cloudflare"
    persistence:
      enabled: true
      name: data
      accessMode: ReadWriteOnce
      size: 128Mi
      storageClass:  local-path
      path: /data
