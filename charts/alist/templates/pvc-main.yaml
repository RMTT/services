{{- if .Values.persistence.main.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: alist-main-pvc
  {{- with .Values.persistence.main.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.persistence.main.storageClass | quote }}
  resources:
    requests:
      storage: {{ .Values.persistence.main.size | quote }}
{{- end }}
