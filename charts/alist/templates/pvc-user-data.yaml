{{- if .Values.persistence.userData.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: alist-user-data-pvc
  {{- with .Values.persistence.userData.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.persistence.userData.storageClass | quote }}
  resources:
    requests:
      storage: {{ .Values.persistence.userData.size | quote }}
{{- end }}
