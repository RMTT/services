apiVersion: apps/v1
kind: Deployment
metadata:
  name: filestash
  labels:
    app: filestash
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: filestash
  template:
    metadata:
      labels:
        app: filestash
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: filestash
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          ports:
            - name: http
              containerPort: 8334
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
          env:
            - name: UID
              value: "1000"
            - name: GID
              value: "1000"
            - name: GDRIVE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: filestash-secrets
                  key: gdrive_client_id
            - name: GDRIVE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: filestash-secrets
                  key: gdrive_client_secret
            {{- if .Values.env }}
            {{- toYaml .Values.env | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: state
              mountPath: /app/data/state/
      volumes:
        - name: state
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: filestash-pvc
          {{- else }}
          emptyDir: {}
          {{- end }}
