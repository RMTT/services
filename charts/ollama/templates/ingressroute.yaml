{{- if .Values.ingressRoute.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "ollama.fullname" . }}
  labels:
    {{- include "ollama.labels" . | nindent 4 }}
spec:
  entryPoints:
    {{- toYaml .Values.ingressRoute.entryPoints | nindent 4 }}
  routes:
    {{- range .Values.ingressRoute.routes }}
    - match: {{ .match | quote }}
      kind: {{ default "Rule" .kind }}
      {{- with .middlewares }}
      middlewares:
        {{- range . }}
        - name: {{ .name }}
          {{- with .namespace }}
          namespace: {{ . }}
          {{- end }}
        {{- end }}
      {{- end }}
      services:
        {{- if .services }}
        {{- range .services }}
        - name: {{ .name }}
          port: {{ .port }}
        {{- end }}
        {{- else }}
        - name: {{ include "ollama.fullname" $ }}
          port: {{ $.Values.service.port }}
        {{- end }}
    {{- end }}
  {{- with .Values.ingressRoute.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
